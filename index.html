<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0d12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Telly Tasks" />
  <link rel="manifest" href="manifest.json" />
  <title>Telly Tasks</title>
  <style>
:root {
  --bg: #0b0d12;
  --panel: rgba(255,255,255,.075);
  --panel-strong: rgba(255,255,255,.11);
  --line: rgba(255,255,255,.13);
  --text: #f5f7fb;
  --muted: rgba(245,247,251,.62);
  --gold: #d7b56d;
  --danger: #ff6b6b;
  --success: #61d394;
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  margin: 0;
  min-height: 100%;
  background:
    radial-gradient(circle at top left, rgba(215,181,109,.16), transparent 32rem),
    radial-gradient(circle at bottom right, rgba(110,168,255,.12), transparent 28rem),
    linear-gradient(180deg, var(--bg), #11141c);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
}

body {
  padding-bottom: calc(66px + var(--safe-bottom));
}

button, input, textarea {
  font: inherit;
}

button {
  border: 0;
  border-radius: 999px;
  padding: 9px 12px;
  font-weight: 750;
  background: var(--panel);
  color: var(--text);
  border: 1px solid var(--line);
}

button:active {
  transform: scale(.98);
}

.primary {
  color: #15120b;
  background: linear-gradient(135deg, #f4dc9f, #caa45f);
  border: 0;
}

.danger {
  color: white;
  background: rgba(255,107,107,.2);
  border: 1px solid rgba(255,107,107,.35);
}

.success {
  color: #06120c;
  background: linear-gradient(135deg, #a7f3c5, #45d383);
  border: 0;
}

.app {
  max-width: 860px;
  margin: 0 auto;
  padding: calc(10px + var(--safe-top)) 10px 18px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 10px;
}

.eyebrow {
  color: var(--gold);
  font-size: 10px;
  font-weight: 850;
  letter-spacing: .13em;
  text-transform: uppercase;
  margin-bottom: 4px;
}

h1 {
  margin: 0;
  font-size: 26px;
  letter-spacing: -.045em;
  line-height: 1;
}

.subtitle {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.3;
  margin-top: 5px;
}

.icon-btn {
  width: 38px;
  height: 38px;
  display: grid;
  place-items: center;
  font-size: 24px;
  padding: 0;
}

.segment {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
  padding: 4px;
  margin: 8px 0;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.055);
  border-radius: 15px;
}

.segment button {
  border: 0;
  background: transparent;
  color: var(--muted);
  padding: 7px 9px;
  border-radius: 11px;
}

.segment button.active {
  color: #15120b;
  background: linear-gradient(135deg, #f4dc9f, #caa45f);
}

.search {
  width: 100%;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.075);
  color: var(--text);
  border-radius: 15px;
  padding: 9px 12px;
  margin: 8px 0 10px;
  outline: 0;
}

.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 7px;
  margin-bottom: 9px;
}

.stat {
  min-height: 44px;
  border-radius: 14px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.065);
  padding: 7px 9px;
}

.stat strong {
  display: block;
  font-size: 17px;
  line-height: 1;
}

.stat span {
  color: var(--muted);
  font-size: 10px;
}

.list {
  display: grid;
  gap: 7px;
}

.counter {
  min-height: 72px;
  display: grid;
  grid-template-columns: 36px 1fr auto;
  gap: 10px;
  align-items: center;
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: linear-gradient(140deg, var(--panel-strong), var(--panel));
  position: relative;
  overflow: hidden;
}

.counter::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at top right, var(--accent), transparent 58%);
  opacity: .16;
  pointer-events: none;
}

.counter > * {
  position: relative;
}

.emoji {
  width: 36px;
  height: 36px;
  display: grid;
  place-items: center;
  border-radius: 13px;
  background: rgba(255,255,255,.08);
  border: 1px solid var(--line);
  font-size: 20px;
}

.counter h2 {
  margin: 0 0 3px;
  font-size: 16px;
  line-height: 1.05;
}

.counter p {
  margin: 0;
  color: var(--muted);
  font-size: 11px;
  line-height: 1.2;
}

.count {
  font-size: 34px;
  font-weight: 950;
  letter-spacing: -.08em;
}

.empty {
  padding: 22px 12px;
  border: 1px dashed var(--line);
  border-radius: 15px;
  color: var(--muted);
  text-align: center;
  font-size: 13px;
}

.detail-card {
  border: 1px solid var(--line);
  border-radius: 18px;
  background: linear-gradient(140deg, var(--panel-strong), var(--panel));
  padding: 12px;
  position: relative;
  overflow: hidden;
}

.detail-card::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at top right, var(--accent), transparent 58%);
  opacity: .16;
  pointer-events: none;
}

.detail-top {
  display: grid;
  grid-template-columns: 36px 1fr auto;
  gap: 10px;
  align-items: center;
  position: relative;
}

.detail-top h2 {
  margin: 0;
  font-size: 20px;
}

.detail-count {
  font-size: 40px;
  font-weight: 950;
  letter-spacing: -.08em;
}

.detail-sub {
  position: relative;
  color: var(--muted);
  font-size: 11px;
  margin: 3px 0 9px 46px;
}

.actions {
  display: flex;
  gap: 7px;
  flex-wrap: wrap;
  position: relative;
}

.actions .wide {
  width: 100%;
  justify-content: center;
  padding: 11px 12px;
  font-size: 15px;
}

.section-title {
  display: flex;
  justify-content: space-between;
  margin: 12px 3px 6px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 850;
  letter-spacing: .08em;
  text-transform: uppercase;
}

.entry {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
  border: 1px solid var(--line);
  border-radius: 13px;
  background: rgba(255,255,255,.065);
  padding: 9px 10px;
}

.entry strong {
  font-size: 13px;
}

.entry p {
  margin: 3px 0 0;
  color: var(--muted);
  white-space: pre-wrap;
  font-size: 12px;
}

.settings-group {
  margin-top: 12px;
}

.settings-row {
  min-height: 38px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  border: 1px solid var(--line);
  border-radius: 13px;
  background: rgba(255,255,255,.065);
  padding: 9px 10px;
  font-size: 13px;
  margin-bottom: 6px;
}

.settings-row span:last-child {
  color: var(--muted);
}

.tabbar {
  position: fixed;
  z-index: 50;
  left: 50%;
  bottom: calc(6px + var(--safe-bottom));
  transform: translateX(-50%);
  width: min(92vw, 520px);
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 5px;
  padding: 5px;
  border-radius: 18px;
  border: 1px solid var(--line);
  background: rgba(20,22,30,.86);
  backdrop-filter: blur(18px);
}

.tab {
  display: grid;
  gap: 1px;
  place-items: center;
  padding: 6px 2px;
  border: 0;
  background: transparent;
  color: var(--muted);
  font-size: 15px;
}

.tab span {
  font-size: 11px;
}

.tab.active {
  color: #15120b;
  background: linear-gradient(135deg, #f4dc9f, #caa45f);
}

dialog {
  width: min(92vw, 390px);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 0;
  background: #171a22;
  color: var(--text);
  box-shadow: 0 30px 80px rgba(0,0,0,.55);
}

dialog::backdrop {
  background: rgba(0,0,0,.58);
  backdrop-filter: blur(4px);
}

.modal {
  padding: 12px;
}

.modal h2 {
  font-size: 18px;
  margin: 0 0 10px;
}

label {
  display: block;
  color: var(--muted);
  font-size: 10px;
  font-weight: 850;
  letter-spacing: .11em;
  text-transform: uppercase;
  margin: 8px 0 4px;
}

input, textarea {
  width: 100%;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.08);
  color: var(--text);
  border-radius: 13px;
  padding: 9px 10px;
  outline: 0;
}

textarea {
  min-height: 64px;
}

.modal-grid {
  display: grid;
  grid-template-columns: 58px 1fr;
  gap: 8px;
}

.swatches {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 6px;
}

.swatch {
  height: 26px;
  border-radius: 999px;
  border: 2px solid transparent;
}

.swatch.active {
  border-color: white;
}

.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 12px;
}

  
.lock-note {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.3;
}

.settings-row.danger {
  color: white;
  background: rgba(255,107,107,.18);
  border: 1px solid rgba(255,107,107,.35);
}


/* v2.1.1 iOS overscroll fix */
html {
  background: #0b0d12 !important;
  min-height: 100%;
  overscroll-behavior-y: none;
}

body {
  background:
    radial-gradient(circle at top left, rgba(215,181,109,.16), transparent 32rem),
    radial-gradient(circle at bottom right, rgba(110,168,255,.12), transparent 28rem),
    linear-gradient(180deg, #0b0d12, #11141c) !important;
  min-height: 100svh;
  overscroll-behavior-y: none;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -1;
  background:
    radial-gradient(circle at top left, rgba(215,181,109,.16), transparent 32rem),
    radial-gradient(circle at bottom right, rgba(110,168,255,.12), transparent 28rem),
    linear-gradient(180deg, #0b0d12, #11141c);
  pointer-events: none;
}

.app {
  min-height: calc(100svh - 82px - var(--safe-bottom));
}

@supports not (height: 100svh) {
  body {
    min-height: 100vh;
  }

  .app {
    min-height: calc(100vh - 82px - var(--safe-bottom));
  }
}


/* v2.2 Theme and Interface Size */
:root {
  --scale: 1;
  --theme-bg: #0b0d12;
  --theme-bg2: #11141c;
  --theme-panel: rgba(255,255,255,.075);
  --theme-panel-strong: rgba(255,255,255,.11);
  --theme-line: rgba(255,255,255,.13);
  --theme-text: #f5f7fb;
  --theme-muted: rgba(245,247,251,.62);
  --theme-accent: #d7b56d;
  --theme-accent2: #caa45f;
  --theme-glow-a: rgba(215,181,109,.16);
  --theme-glow-b: rgba(110,168,255,.12);
}

:root[data-size="compact"] { --scale: .88; }
:root[data-size="standard"] { --scale: 1; }
:root[data-size="comfortable"] { --scale: 1.10; }
:root[data-size="large"] { --scale: 1.20; }

:root[data-theme="emerald-elite"] {
  --theme-bg: #06100d;
  --theme-bg2: #0b1712;
  --theme-panel: rgba(232,255,245,.07);
  --theme-panel-strong: rgba(232,255,245,.115);
  --theme-line: rgba(173,255,214,.16);
  --theme-text: #f2fff8;
  --theme-muted: rgba(242,255,248,.62);
  --theme-accent: #35d07f;
  --theme-accent2: #0f9f5b;
  --theme-glow-a: rgba(53,208,127,.22);
  --theme-glow-b: rgba(14,124,78,.16);
}

:root[data-theme="arctic-white"] {
  --theme-bg: #f4f6f8;
  --theme-bg2: #e9edf2;
  --theme-panel: rgba(255,255,255,.72);
  --theme-panel-strong: rgba(255,255,255,.92);
  --theme-line: rgba(20,25,35,.12);
  --theme-text: #111827;
  --theme-muted: rgba(17,24,39,.58);
  --theme-accent: #c59b4a;
  --theme-accent2: #a47c32;
  --theme-glow-a: rgba(197,155,74,.16);
  --theme-glow-b: rgba(80,120,180,.12);
}

:root {
  --bg: var(--theme-bg);
  --panel: var(--theme-panel);
  --panel-strong: var(--theme-panel-strong);
  --line: var(--theme-line);
  --text: var(--theme-text);
  --muted: var(--theme-muted);
  --gold: var(--theme-accent);
}

html, body, body::after {
  background:
    radial-gradient(circle at top left, var(--theme-glow-a), transparent 32rem),
    radial-gradient(circle at bottom right, var(--theme-glow-b), transparent 28rem),
    linear-gradient(180deg, var(--theme-bg), var(--theme-bg2)) !important;
}

.primary,
.segment button.active,
.tab.active {
  background: linear-gradient(135deg, color-mix(in srgb, var(--theme-accent) 80%, white), var(--theme-accent2)) !important;
  color: #07120c !important;
}

:root[data-theme="arctic-white"] .primary,
:root[data-theme="arctic-white"] .segment button.active,
:root[data-theme="arctic-white"] .tab.active {
  color: #111827 !important;
}

.tabbar {
  background: color-mix(in srgb, var(--theme-bg2) 86%, transparent) !important;
}

.detail-card,
.counter {
  background: linear-gradient(140deg, var(--theme-panel-strong), var(--theme-panel)) !important;
}

.app {
  padding-left: calc(10px * var(--scale)) !important;
  padding-right: calc(10px * var(--scale)) !important;
}

h1 { font-size: calc(26px * var(--scale)) !important; }
.subtitle { font-size: calc(12px * var(--scale)) !important; }
.eyebrow { font-size: calc(10px * var(--scale)) !important; }

.counter {
  min-height: calc(72px * var(--scale)) !important;
  padding: calc(10px * var(--scale)) calc(12px * var(--scale)) !important;
  gap: calc(10px * var(--scale)) !important;
}

.emoji {
  width: calc(36px * var(--scale)) !important;
  height: calc(36px * var(--scale)) !important;
  font-size: calc(20px * var(--scale)) !important;
}

.counter h2 {
  font-size: calc(16px * var(--scale)) !important;
}

.counter p {
  font-size: calc(11px * var(--scale)) !important;
}

.count {
  font-size: calc(34px * var(--scale)) !important;
}

.stat {
  min-height: calc(44px * var(--scale)) !important;
  padding: calc(7px * var(--scale)) calc(9px * var(--scale)) !important;
}

.stat strong {
  font-size: calc(17px * var(--scale)) !important;
}

.stat span {
  font-size: calc(10px * var(--scale)) !important;
}

.search,
.settings-row,
.entry,
button,
input,
textarea {
  font-size: calc(13px * var(--scale)) !important;
}

.detail-card {
  padding: calc(12px * var(--scale)) !important;
}

.detail-top {
  grid-template-columns: calc(36px * var(--scale)) 1fr auto !important;
}

.detail-top h2 {
  font-size: calc(20px * var(--scale)) !important;
}

.detail-count {
  font-size: calc(40px * var(--scale)) !important;
}

.detail-sub {
  font-size: calc(11px * var(--scale)) !important;
  margin-left: calc(46px * var(--scale)) !important;
}

.tab span {
  font-size: calc(11px * var(--scale)) !important;
}

.tab {
  font-size: calc(15px * var(--scale)) !important;
}

:root[data-theme="arctic-white"] .tabbar {
  background: rgba(255,255,255,.82) !important;
}

:root[data-theme="arctic-white"] dialog {
  background: #ffffff !important;
}

:root[data-theme="arctic-white"] input,
:root[data-theme="arctic-white"] textarea {
  background: rgba(17,24,39,.04) !important;
}


/* v2.2.1 Compact overscroll fix */
html,
body {
  background-color: var(--theme-bg) !important;
  min-height: 100svh !important;
  overflow-x: hidden !important;
}

body {
  position: relative;
}

.app {
  min-height: calc(100svh - 56px - var(--safe-bottom)) !important;
  padding-bottom: calc(18px + var(--safe-bottom)) !important;
}

:root[data-size="compact"] .app {
  min-height: calc(100svh - 44px - var(--safe-bottom)) !important;
  padding-bottom: calc(26px + var(--safe-bottom)) !important;
}

:root[data-size="compact"] body {
  padding-bottom: calc(72px + var(--safe-bottom)) !important;
}

:root[data-size="standard"] body,
:root[data-size="comfortable"] body,
:root[data-size="large"] body {
  padding-bottom: calc(66px + var(--safe-bottom)) !important;
}

body::before {
  content: "";
  position: fixed;
  left: 0;
  right: 0;
  bottom: -80px;
  height: 160px;
  background: linear-gradient(180deg, var(--theme-bg2), var(--theme-bg2)) !important;
  z-index: -2;
  pointer-events: none;
}

@supports not (height: 100svh) {
  .app {
    min-height: calc(100vh - 56px - var(--safe-bottom)) !important;
  }

  :root[data-size="compact"] .app {
    min-height: calc(100vh - 44px - var(--safe-bottom)) !important;
  }
}


/* v2.3.0 Welcome */
.tj-toast {
  position: fixed;
  left: 50%;
  bottom: calc(76px + var(--safe-bottom));
  z-index: 999;
  transform: translate(-50%, 16px);
  opacity: 0;
  color: #07120c;
  background: linear-gradient(135deg, color-mix(in srgb, var(--theme-accent) 82%, white), var(--theme-accent2));
  border-radius: 999px;
  padding: 9px 14px;
  font-size: 12px;
  font-weight: 800;
  box-shadow: 0 14px 34px rgba(0,0,0,.32);
  transition: opacity .2s ease, transform .2s ease;
}

.tj-toast.show {
  opacity: 1;
  transform: translate(-50%, 0);
}

.tj-onboarding {
  width: min(92vw, 410px);
}

.onboarding-card {
  text-align: center;
  padding: calc(18px * var(--scale)) !important;
}

.onboarding-progress {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-bottom: 14px;
}

.onboarding-progress span {
  width: 7px;
  height: 7px;
  border-radius: 999px;
  background: var(--line);
}

.onboarding-progress span.active {
  width: 22px;
  background: var(--theme-accent);
}

.onboarding-icon,
.help-hero-icon {
  width: calc(54px * var(--scale));
  height: calc(54px * var(--scale));
  margin: 0 auto 12px;
  display: grid;
  place-items: center;
  border-radius: 18px;
  font-size: calc(29px * var(--scale));
  border: 1px solid var(--line);
  background: var(--panel-strong);
}

.onboarding-card p,
.help-copy {
  color: var(--muted);
  font-size: calc(13px * var(--scale));
  line-height: 1.55;
}

.stacked-actions {
  display: grid !important;
  grid-template-columns: 1fr;
}

.stacked-actions button {
  width: 100%;
}

.help-list-grid {
  display: grid;
  gap: calc(7px * var(--scale));
}

.help-row {
  width: 100%;
  min-height: calc(45px * var(--scale));
  display: grid;
  grid-template-columns: calc(32px * var(--scale)) 1fr auto;
  align-items: center;
  gap: calc(9px * var(--scale));
  text-align: left;
  border-radius: calc(13px * var(--scale));
  background: var(--panel);
}

.help-row-icon {
  font-size: calc(20px * var(--scale));
}

.help-row b {
  color: var(--muted);
  font-size: calc(20px * var(--scale));
}

.replay-intro {
  width: 100%;
  margin-top: 12px;
}

.help-article {
  border: 1px solid var(--line);
  background: var(--panel);
  border-radius: calc(18px * var(--scale));
  padding: calc(15px * var(--scale));
}

.help-article .help-hero-icon {
  margin-left: 0;
}

.help-article h1 {
  margin-bottom: 14px;
}

.help-body {
  color: var(--text);
  font-size: calc(13px * var(--scale));
  line-height: 1.62;
}

.help-body p {
  color: var(--muted);
}

.help-body strong,
.help-body h3 {
  color: var(--text);
}

.help-body h3 {
  margin: 18px 0 7px;
  font-size: calc(14px * var(--scale));
}

.help-list {
  margin: 8px 0 14px;
  padding-left: 20px;
  color: var(--muted);
}

.help-list li {
  margin: 6px 0;
}

.help-list.numbered {
  padding-left: 22px;
}

.example-grid,
.principles {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 7px;
  margin: 12px 0;
}

  <script>
const TJ_STORAGE_KEY = "telly-tasks-v1";
const TJ_VERSION = "0.1.0-alpha.5";
const TJ_RELEASE = "Vrije onderruimte";
const TJ_BUILD = "20260714-TT05";
const TJ_CONTACT_EMAIL = "my.telly.journal@gmail.com";
const TJ_STATUS = "Alpha";

function loadState() {
  try {
    const state = JSON.parse(localStorage.getItem(TJ_STORAGE_KEY));
    if (state && Array.isArray(state.counters)) return state;
  } catch {}
  return { version: TJ_VERSION, counters: [], tasks: [], settings: { language: "auto", theme: "midnight-gold", interfaceSize: "standard", pinEnabled: false, pinHash: "", lockOnOpen: true, onboardingCompleted: true } };
}

function saveState(state, markDataChange = true) {
  state.version = TJ_VERSION;
  state.settings = state.settings || {};

  if (markDataChange) {
    state.settings.lastDataChangeAt = new Date().toISOString();
  }

  localStorage.setItem(TJ_STORAGE_KEY, JSON.stringify(state));
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}


function exportJson(state) {
  const now = new Date();
  const filename = `Backup-TJ-${fileTimestamp(now)}.json`;

  const backup = {
    version: TJ_VERSION,
    release: TJ_RELEASE,
    build: TJ_BUILD,
    appName: "Telly Tasks",
    exportedAt: now.toISOString(),
    counters: state.counters,
    deletedCounters: state.deletedCounters || [],
    settings: state.settings
  };

  const blob = new Blob([JSON.stringify(backup, null, 2)], { type: "application/json" });
  downloadBlob(blob, filename);

  state.settings.lastBackupAt = now.toISOString();
  state.settings.lastDataChangeAt = state.settings.lastBackupAt;
  saveState(state, false);

  showToast("Backup created");
  if (screen === "settings") renderSettings();
}

function exportCsv(counters) {
  const rows = [["Counter", "Status", "Emoji", "Date and Time", "Note"]];
  counters.forEach(counter => {
    (counter.entries || []).forEach(entry => {
      rows.push([
        counter.name,
        counter.archived ? "Archived" : "Active",
        counter.emoji || "",
        formatDate(entry.dateTime),
        entry.note || ""
      ]);
    });
  });

  const csv = rows.map(row => row.map(v => `"${String(v).replaceAll('"', '""')}"`).join(";")).join("\n");
  downloadBlob(new Blob([csv], { type: "text/csv;charset=utf-8" }), `Export-TJ-${fileTimestamp(new Date())}.csv`);
}

function fileTimestamp(date = new Date()) {
  const pad = value => String(value).padStart(2, "0");
  return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}-${pad(date.getHours())}${pad(date.getMinutes())}`;
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function importJsonFile(file, state, onDone) {
  const reader = new FileReader();

  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      const importedCounters = Array.isArray(data) ? data : data.counters;

      if (!Array.isArray(importedCounters)) throw new Error("No counters found");

      const add = confirm("Import JSON backup?\n\nOK = Add imported counters.\nCancel = Replace current data.");
      const counters = importedCounters.map(normalizeCounter);

      if (add) {
        const ids = new Set(state.counters.map(c => c.id));
        counters.forEach(counter => {
          if (ids.has(counter.id)) counter.id = uid();
          state.counters.push(counter);
        });
      } else {
        if (!confirm("Replace all current data?")) return;
        state.counters = counters;
        state.deletedCounters = Array.isArray(data.deletedCounters)
          ? data.deletedCounters.map(counter => ({
              ...normalizeCounter(counter),
              deletedAt: counter.deletedAt || new Date().toISOString()
            }))
          : [];
      }

      state.settings = state.settings || {};
      state.settings.lastDataChangeAt = new Date().toISOString();
      saveState(state, false);
      alert("Import completed.");
      onDone();
    } catch {
      alert("Import failed. This file could not be read.");
    }
  };

  reader.readAsText(file);
}

function normalizeCounter(counter) {
  return {
    id: counter.id || uid(),
    name: counter.name || "Imported Counter",
    emoji: counter.emoji || "📌",
    color: counter.color || "#d7b56d",
    archived: !!counter.archived,
    showDaysBetweenEntries: !!counter.showDaysBetweenEntries,
    createdAt: counter.createdAt || new Date().toISOString(),
    entries: (counter.entries || []).map(entry => ({
      id: entry.id || uid(),
      dateTime: entry.dateTime || new Date().toISOString(),
      note: entry.note || ""
    })).sort((a, b) => new Date(b.dateTime) - new Date(a.dateTime))
  };
}

function hashPin(pin) {
  let hash = 0;
  const text = "tj:" + String(pin);
  for (let i = 0; i < text.length; i++) {
    hash = ((hash << 5) - hash) + text.charCodeAt(i);
    hash |= 0;
  }
  return String(hash);
}

function setPin() {
  const pin1 = prompt("Choose a PIN code. Use at least 4 digits.");
  if (pin1 === null) return;
  if (!/^\d{4,12}$/.test(pin1)) {
    alert("PIN must be 4 to 12 digits.");
    return;
  }

  const pin2 = prompt("Repeat your PIN code.");
  if (pin2 === null) return;

  if (pin1 !== pin2) {
    alert("PIN codes do not match.");
    return;
  }

  state.settings.pinEnabled = true;
  state.settings.pinHash = hashPin(pin1);
  state.settings.lockOnOpen = true;
  saveState(state);
  alert("PIN enabled.");
  render();
}

function changePin() {
  const oldPin = prompt("Enter current PIN.");
  if (oldPin === null) return;
  if (hashPin(oldPin) !== state.settings.pinHash) {
    alert("Incorrect PIN.");
    return;
  }

  const pin1 = prompt("Choose a new PIN code. Use at least 4 digits.");
  if (pin1 === null) return;
  if (!/^\d{4,12}$/.test(pin1)) {
    alert("PIN must be 4 to 12 digits.");
    return;
  }

  const pin2 = prompt("Repeat your new PIN code.");
  if (pin2 === null) return;
  if (pin1 !== pin2) {
    alert("PIN codes do not match.");
    return;
  }

  state.settings.pinHash = hashPin(pin1);
  saveState(state);
  alert("PIN changed.");
  render();
}

function disablePin() {
  const pin = prompt("Enter current PIN to disable access control.");
  if (pin === null) return;
  if (hashPin(pin) !== state.settings.pinHash) {

function updateAppCache() {
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.getRegistrations().then(registrations => {
      registrations.forEach(registration => registration.unregister());
      if ("caches" in window) {
        caches.keys().then(keys => Promise.all(keys.map(key => caches.delete(key)))).then(() => {
          alert("App cache cleared. Close and reopen the app.");
        });
      } else {
        alert("Service worker cleared. Close and reopen the app.");
      }
    });
  } else {
    alert("No app cache found.");
  }
}




function versionUrl() {
  const url = new URL(window.location.href);
  url.searchParams.set("build", TJ_BUILD);
  url.searchParams.set("_", Date.now().toString());
  return url.toString();
}

async function checkForUpdates(manual = false) {
  try {
    state.settings.lastUpdateCheckAt = new Date().toISOString();
    saveState(state, false);
    const response = await fetch(`index.html?update-check=${Date.now()}`, { cache: "no-store" });
    if (!response.ok) throw new Error("Update check failed");
    const text = await response.text();
    const versionMatch = text.match(/const TJ_VERSION = "([^"]+)"/);
    const buildMatch = text.match(/const TJ_BUILD = "([^"]+)"/);
    const remoteVersion = versionMatch ? versionMatch[1] : "";
    const remoteBuild = buildMatch ? buildMatch[1] : "";
    if (remoteBuild && remoteBuild !== TJ_BUILD) showUpdateDialog(remoteVersion || "New version", remoteBuild);
    else if (manual) showToast("You are up to date");
  } catch (error) {
    if (manual) alert("Update check failed. Please try again later.");
  }
}

function showUpdateDialog(version, build) {
  const dialog = document.createElement("dialog");
  dialog.className = "tj-update-dialog";
  dialog.innerHTML = `<div class="modal"><div class="help-hero-icon">🎉</div><h2>Update available</h2><p class="help-copy">A newer Telly Tasks build is available.</p><div class="info-card"><span>Version</span><strong>${version}</strong></div><div class="info-card"><span>Build</span><strong>${build}</strong></div><div class="modal-actions stacked-actions"><button class="primary" onclick="installLatestUpdate()">Update Now</button><button onclick="dismissUpdate('${build}', this.closest('dialog'))">Later</button></div></div>`;
  document.body.appendChild(dialog); dialog.showModal();
}


function dismissUpdate(build, dialog) {
  state.settings.dismissedUpdateBuild = build;
  saveState(state, false);
  dialog.remove();
  showToast("Update postponed");
}

async function installLatestUpdate() {
  state.settings.dismissedUpdateBuild = "";
  saveState(state, false);

  try {
    const regs = await navigator.serviceWorker?.getRegistrations?.() || [];
    await Promise.all(regs.map(r => r.unregister()));
    if ("caches" in window) { const keys = await caches.keys(); await Promise.all(keys.map(k => caches.delete(k))); }
  } finally { window.location.replace(versionUrl()); }
}

function scheduleAutomaticUpdateCheck() {
  if (state.settings.autoUpdateCheck) setTimeout(() => checkForUpdates(false), 1200);
}

function showToast(message) {
  const existing = document.querySelector(".tj-toast");
  if (existing) existing.remove();

  const toast = document.createElement("div");
  toast.className = "tj-toast";
  toast.textContent = message;
  document.body.appendChild(toast);

  requestAnimationFrame(() => toast.classList.add("show"));
  setTimeout(() => {
    toast.classList.remove("show");
    setTimeout(() => toast.remove(), 220);
  }, 1700);
}

function currentLanguage() {
  const pref = state.settings.language || "auto";
  if (pref === "en" || pref === "nl") return pref;
  return (navigator.language || "en").toLowerCase().startsWith("nl") ? "nl" : "en";
}

function translateString(value) {
  const lang = currentLanguage();
  if (lang !== "nl") return value;

  const trimmed = String(value || "").trim();
  if (I18N.nl[trimmed]) return I18N.nl[trimmed];

  let match = trimmed.match(/^(\d+)\s+days since last entry$/i);
  if (match) return `${match[1]} dagen sinds het laatste item`;

  match = trimmed.match(/^1 day since last entry$/i);
  if (match) return "1 dag sinds het laatste item";

  match = trimmed.match(/^(\d+)\s+days later$/i);
  if (match) return `${match[1]} dagen later`;

  match = trimmed.match(/^1 day later$/i);
  if (match) return "1 dag later";

  match = trimmed.match(/^(\d+)\s+items$/i);
  if (match) return `${match[1]} items`;

  match = trimmed.match(/^(\d+)\s+entries$/i);
  if (match) return `${match[1]} items`;

  match = trimmed.match(/^(\d+)\s+item$/i);
  if (match) return `${match[1]} item`;

  match = trimmed.match(/^(\d+)\s+entry$/i);
  if (match) return `${match[1]} item`;

  match = trimmed.match(/^Version\s+(.+)$/i);
  if (match) return `Versie ${match[1]}`;

  return value;
}

function applyTranslations(root = document) {
  const lang = currentLanguage();
  document.documentElement.lang = lang;

  root.querySelectorAll("input[placeholder], textarea[placeholder]").forEach(el => {
    el.placeholder = translateString(el.placeholder);
  });

  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
  const nodes = [];
  while (walker.nextNode()) nodes.push(walker.currentNode);

  nodes.forEach(node => {
    const parent = node.parentElement;
    if (!parent || ["SCRIPT","STYLE"].includes(parent.tagName)) return;

    const original = node.nodeValue;
    const trimmed = original.trim();
    if (!trimmed) return;

    const translated = translateString(trimmed);
    if (translated !== trimmed) {
      node.nodeValue = original.replace(trimmed, translated);
    }
  });
}

function setLanguagePreference(value) {
  state.settings.language = value;
  saveState(state, false);
  render();
  setTimeout(() => applyTranslations(document), 0);
}

const nativeAlert = window.alert.bind(window);
const nativePrompt = window.prompt.bind(window);
const nativeConfirm = window.confirm.bind(window);

window.alert = message => nativeAlert(translateString(message));
window.prompt = (message, defaultValue) => nativePrompt(translateString(message), defaultValue);
window.confirm = message => nativeConfirm(translateString(message));

const translationObserver = new MutationObserver(mutations => {
  for (const mutation of mutations) {
    mutation.addedNodes.forEach(node => {
      if (node.nodeType === 1) applyTranslations(node);
    });
  }
});

  if (status.includes("stable")) return "stable-status";
  if (status.includes("test")) return "test-status";

}

function formatFriendlyDate(value) {
  if (!value) return "Never";
  return new Intl.DateTimeFormat(currentLanguage() === "nl" ? "nl-NL" : "en-GB", {
    dateStyle: "medium",
    timeStyle: "short"
  }).format(new Date(value));
}

function sameCalendarDay(a, b) {
  if (!a || !b) return false;
  return new Date(a).toDateString() === new Date(b).toDateString();
}

function hasUnbackedChanges() {
  const changed = state.settings.lastDataChangeAt;
  const backedUp = state.settings.lastBackupAt;

  if (!changed) return false;
  if (!backedUp) return state.counters.some(counter => (counter.entries || []).length > 0);
  return new Date(changed) > new Date(backedUp);
}

function showBackupReminder() {
  const dialog = document.createElement("dialog");
  dialog.className = "tj-system-dialog";
  dialog.innerHTML = `
    <div class="modal">
      <div class="help-hero-icon">💾</div>
      <h2>Backup recommended</h2>
      <p class="help-copy">
        Your journal contains changes that have not been backed up yet.
      </p>
      <p class="help-copy">
        Telly Tasks is currently under active development. Creating a backup only takes a few seconds and helps protect your data.
      </p>
      <div class="modal-actions stacked-actions">
        <button class="primary" onclick="exportJson(state); this.closest('dialog').remove()">${currentLanguage() === "nl" ? "Back-up maken" : "Create Backup"}</button>
        <button onclick="dismissBackupReminder(this.closest('dialog'))">Remind Me Later</button>
      </div>
    </div>
  `;

  document.body.appendChild(dialog);
  dialog.addEventListener("close", () => dialog.remove());
  dialog.showModal();
}

function dismissBackupReminder(dialog) {
  state.settings.backupReminderDismissedAt = new Date().toISOString();
  saveState(state, false);
  dialog.remove();
}

function runStartupChecks() {
  if (startupChecksCompleted || locked || !state.settings.onboardingCompleted) return;
  startupChecksCompleted = true;

  const dismissedToday = sameCalendarDay(
    state.settings.backupReminderDismissedAt,
    new Date().toISOString()
  );

  if (hasUnbackedChanges() && !dismissedToday) {
    setTimeout(showBackupReminder, 450);
  }
}

  dialog.remove();
  render();
  setTimeout(runStartupChecks, 350);
}

function cleanupRecentlyDeleted() {
  const cutoff = Date.now() - 30 * 86400000;
  const before = state.deletedCounters.length;
  state.deletedCounters = state.deletedCounters.filter(c => new Date(c.deletedAt || 0).getTime() >= cutoff);
  if (before !== state.deletedCounters.length) saveState(state, false);
}
function moveCounterToRecentlyDeleted(counterId) {
  const counter = getCounter(counterId); if (!counter) return;
  state.deletedCounters.push({...JSON.parse(JSON.stringify(counter)), deletedAt:new Date().toISOString()});
  state.counters = state.counters.filter(c => c.id !== counterId);
  selectedCounterId = null; saveState(state); showToast("Moved to Recently Deleted"); render();
}
function restoreDeletedCounter(counterId) {
  const item = state.deletedCounters.find(c => c.id===counterId); if(!item) return;
  const restored=JSON.parse(JSON.stringify(item)); delete restored.deletedAt; restored.archived=false;
  if(state.counters.some(c=>c.id===restored.id)) restored.id=uid();
  state.counters.push(restored); state.deletedCounters=state.deletedCounters.filter(c=>c.id!==counterId);
  saveState(state); showToast("Counter restored"); renderRecentlyDeleted();
}
function permanentlyDeleteCounter(counterId) {
  const item=state.deletedCounters.find(c=>c.id===counterId); if(!item) return;
  if(!confirm(`Permanently delete "${item.name}"? This cannot be undone.`)) return;
  state.deletedCounters=state.deletedCounters.filter(c=>c.id!==counterId); saveState(state); showToast("Deleted permanently"); renderRecentlyDeleted();
}
function emptyRecentlyDeleted() {
  if(!state.deletedCounters.length || !confirm("Permanently delete all recently deleted counters?")) return;
  state.deletedCounters=[]; saveState(state); showToast("Recently Deleted emptied"); renderRecentlyDeleted();
}
function daysRemaining(item) { return Math.max(0, Math.ceil((new Date(item.deletedAt).getTime()+30*86400000-Date.now())/86400000)); }
function renderRecentlyDeleted() {
  cleanupRecentlyDeleted(); screen="deleted"; selectedCounterId=null;
  app.innerHTML=`<div class="header"><div><div class="eyebrow">Recovery</div><h1>Recently Deleted</h1><div class="subtitle">${state.deletedCounters.length} ${state.deletedCounters.length === 1 ? "item" : "items"} · Automatically removed after 30 days.</div></div><button onclick="returnToSettings()">Done</button></div>${state.deletedCounters.length?`<button class="settings-row danger" onclick="emptyRecentlyDeleted()"><span>Empty Recently Deleted</span><span>${state.deletedCounters.length}</span></button><div class="list deleted-list">${state.deletedCounters.slice().sort((a,b)=>new Date(b.deletedAt)-new Date(a.deletedAt)).map(c=>`<div class="deleted-card" style="--accent:${c.color||'#d7b56d'}"><div class="emoji">${escapeHtml(c.emoji||'📌')}</div><div class="deleted-content"><strong>${escapeHtml(c.name)}</strong><small>${(c.entries||[]).length} entries · ${daysRemaining(c)} days remaining</small></div><div class="deleted-actions"><button class="success" onclick="restoreDeletedCounter('${c.id}')">Restore</button><button class="danger" onclick="permanentlyDeleteCounter('${c.id}')">Delete</button></div></div>`).join('')}</div>`:`<div class="empty">No recently deleted counters.</div>`}`;
  app.scrollTo(0,0);
}

function render() {
  queueMicrotask(() => applyTranslations(document));
  if (locked) return showLockScreen();

  if (!state.settings.onboardingCompleted) {
    if (!document.querySelector(".tj-onboarding")) showOnboarding(0);
    return;
  }

  if (screen === "help") {
    return helpArticle ? renderHelpArticle(helpArticle) : renderHelpCenter();
  }
  if (screen === "deleted") return renderRecentlyDeleted();

  if (selectedCounterId) return renderDetail(selectedCounterId);
  if (screen === "settings") {
    renderSettings();
  } else if (screen === "journal") {
    renderJournal();
  } else {
    renderHome();
  }

  setTimeout(runStartupChecks, 300);
  scheduleAutomaticUpdateCheck();
  setTimeout(showReleaseOverlayIfNeeded, 900);
  translationObserver.observe(document.body, { childList: true, subtree: true });
  setTimeout(() => applyTranslations(document), 50);
}

function todayKey(date = new Date()) {
  return new Intl.DateTimeFormat("sv-SE", { timeZone: "Europe/Amsterdam", dateStyle: "short" }).format(new Date(date));
}

function formatDate(value) {
  const date = new Date(value);
  return new Intl.DateTimeFormat(currentLanguage() === "nl" ? "nl-NL" : "en-GB", { day: "2-digit", month: "short", year: "numeric" }).format(date) + " • " +
         new Intl.DateTimeFormat(currentLanguage() === "nl" ? "nl-NL" : "en-GB", { timeStyle: "short" }).format(date);
}

function lastText(counter) {
  const entry = counter.entries?.[0];
  return entry ? formatDate(entry.dateTime) : "No entries yet";
}

function sortedCounters() {
  return [...state.counters].sort((a, b) => {
    const aTime = a.entries?.[0]?.dateTime || a.createdAt || 0;
    const bTime = b.entries?.[0]?.dateTime || b.createdAt || 0;
    return new Date(bTime) - new Date(aTime);
  });
}

function homeInsightText(counter) {
  if (!counter.showDaysBetweenEntries) return "";

  const entries = (counter.entries || [])
    .map(entry => {
      const raw = entry.dateTime || entry.date || entry.createdAt || "";
      const parsed = raw ? new Date(raw) : null;
      return {
        ...entry,
        _parsedDate: parsed && !Number.isNaN(parsed.getTime()) ? parsed : null
      };
    })
    .filter(entry => entry._parsedDate)
    .sort((a, b) => b._parsedDate - a._parsedDate);

  if (!entries.length) return "No entries yet";

  const latest = entries[0]._parsedDate;
  const today = new Date();

  const latestDay = new Date(latest.getFullYear(), latest.getMonth(), latest.getDate());
  const todayDay = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  const diff = Math.max(0, Math.round((todayDay - latestDay) / 86400000));

  if (diff === 0) return "Today";
  if (diff === 1) return "1 day since last entry";
  return `${diff} days since last entry`;
}

function calendarDayDifference(newerDateTime, olderDateTime) {
  const newer = new Date(newerDateTime);
  const older = new Date(olderDateTime);
  const newerDay = Date.UTC(newer.getFullYear(), newer.getMonth(), newer.getDate());
  const olderDay = Date.UTC(older.getFullYear(), older.getMonth(), older.getDate());
  return Math.max(0, Math.round((newerDay - olderDay) / 86400000));
}

function daysSinceLatestEntry(counter) {
  const entries = (counter.entries || []).slice().sort((a,b) => new Date(b.dateTime) - new Date(a.dateTime));
  if (!entries.length) return null;
  return calendarDayDifference(new Date().toISOString(), entries[0].dateTime);
}

function renderCounterTimeline(counter) {
  const entries = (counter.entries || []).slice().sort((a,b) => new Date(b.dateTime) - new Date(a.dateTime));
  if (!entries.length) return `<div class="empty">No entries yet.</div>`;

  const rows = entries.map((entry, index) => {
    const older = entries[index + 1];
    const gap = older ? calendarDayDifference(entry.dateTime, older.dateTime) : 0;
    return `
      <div class="entry timeline-entry">
        <div class="entry-content" onclick="openEntryDialog('${counter.id}', false, '${entry.id}')">
          <strong>${formatDate(entry.dateTime)}</strong>
          <p>${entry.note ? escapeHtml(entry.note) : "No note"}</p>
        </div>
        ${counter.archived ? "" : `<button class="danger entry-delete-fixed" onclick="deleteEntry('${counter.id}', '${entry.id}')">×</button>`}
      </div>
      ${counter.showDaysBetweenEntries && gap > 0 ? `
        <div class="day-gap-marker"><span></span><strong>${gap} ${gap === 1 ? "day" : "days"} later</strong><span></span></div>
      ` : ""}
    `;
  }).join("");

  const since = daysSinceLatestEntry(counter);
  const sinceBlock = counter.showDaysBetweenEntries && since > 0
    ? `<div class="since-last-entry">🗓️ ${since} ${since === 1 ? "day" : "days"} since last entry</div>`
    : "";

  return rows + sinceBlock;
}

  return state.counters.find(c => c.id === id);
}

function openCounterDialog(id = null) {
  const counter = id ? getCounter(id) : null;
  selectedColor = counter?.color || "#d7b56d";

  const dialog = document.createElement("dialog");
  dialog.innerHTML = `
    <form class="modal" method="dialog">
      <h2>${counter ? "Edit Counter" : "New Counter"}</h2>
      <div class="modal-grid">
        <div>
          <label>Emoji</label>
          <input id="counterEmoji" maxlength="2" value="${escapeHtml(counter?.emoji || "📌")}" />
        </div>
        <div>
          <label>Name</label>
          <input id="counterName" value="${escapeHtml(counter?.name || "")}" placeholder="Counter name" />
        </div>
      </div>
      <label>Color</label>
      <div class="swatches">
        ${colors.map(color => `<button type="button" class="swatch ${color === selectedColor ? "active" : ""}" style="background:${color}" onclick="selectColor('${color}', this)"></button>`).join("")}
      </div>
      <label class="counter-toggle-row">
        <span><strong>Show days between entries</strong><small>Display subtle timeline markers for this counter.</small></span>
        <input id="counterDaysToggle" type="checkbox" ${counter?.showDaysBetweenEntries ? "checked" : ""} />
      </label>
      <div class="modal-actions">
        <button type="button" onclick="this.closest('dialog').remove()">Cancel</button>
        <button type="submit" class="primary">Save</button>
      </div>
    </form>
  `;

  dialog.querySelector("form").addEventListener("submit", event => {
    event.preventDefault();
    const name = dialog.querySelector("#counterName").value.trim();
    const emoji = dialog.querySelector("#counterEmoji").value.trim() || "📌";
    const showDaysBetweenEntries = !!dialog.querySelector("#counterDaysToggle")?.checked;
    if (!name) return;

    if (counter) {
      counter.name = name;
      counter.emoji = emoji;
      counter.color = selectedColor;
      counter.showDaysBetweenEntries = showDaysBetweenEntries;
    } else {
      state.counters.push({
        id: uid(),
        name,
        emoji,
        color: selectedColor,
        archived: false,
        showDaysBetweenEntries,
        createdAt: new Date().toISOString(),
        entries: []
      });
    }

    saveState(state);
    dialog.remove();
    render();
  });

  document.body.appendChild(dialog);
  dialog.showModal();
}

function selectColor(color, element) {
  selectedColor = color;
  document.querySelectorAll(".swatch").forEach(s => s.classList.remove("active"));
  element.classList.add("active");
}

function openEntryDialog(counterId, old = false, entryId = null) {
  const counter = getCounter(counterId);
  const entry = entryId ? counter.entries.find(e => e.id === entryId) : null;
  const dialog = document.createElement("dialog");

  dialog.innerHTML = `
    <form class="modal" method="dialog">
      <h2>${entry ? "Edit Entry" : "New Entry"}</h2>
      <label>Date and time</label>
      <input id="entryDateTime" type="datetime-local" value="${entry ? toLocalInput(entry.dateTime) : old ? "" : toLocalInput(new Date().toISOString())}" required />
      <label>Note</label>
      <textarea id="entryNote" placeholder="Optional">${escapeHtml(entry?.note || "")}</textarea>
      <div class="modal-actions">
        <button type="button" onclick="this.closest('dialog').remove()">Cancel</button>
        <button type="submit" class="primary">Save</button>
      </div>
    </form>
  `;

  dialog.querySelector("form").addEventListener("submit", event => {
    event.preventDefault();
    const dateTime = dialog.querySelector("#entryDateTime").value;
    const note = dialog.querySelector("#entryNote").value.trim();

    if (entry) {
      entry.dateTime = new Date(dateTime).toISOString();
      entry.note = note;
    } else {
      counter.entries.push({ id: uid(), dateTime: new Date(dateTime).toISOString(), note });
    }

    counter.entries.sort((a, b) => new Date(b.dateTime) - new Date(a.dateTime));
    saveState(state);
    dialog.remove();
    render();
  });

  document.body.appendChild(dialog);
  dialog.showModal();
}

function toLocalInput(value) {
  const date = new Date(value);
  const pad = n => String(n).padStart(2, "0");
  return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
}

          <small>${(counter.entries || []).length} ${(counter.entries || []).length === 1 ? "entry" : "entries"}</small>
        </div>
      </div>

      <div class="counter-menu-list">
        <button class="counter-menu-item archive-menu"
                onclick="${counter.archived ? `restoreCounter('${counter.id}')` : `archiveCounter('${counter.id}')`}; this.closest('dialog').remove()">
          <span>${counter.archived ? "↩️" : "📦"}</span>
          <div><strong>${counter.archived ? "Restore" : "Archive"}</strong><small>${counter.archived ? "Move back to Active" : "Move out of Active"}</small></div>
        </button>

        <button class="counter-menu-item"
                onclick="this.closest('dialog').remove(); openCounterDialog('${counter.id}')">
          <span>🎨</span>
          <div><strong>Change Color</strong><small>Choose another counter color</small></div>
        </button>

        <button class="counter-menu-item"
                onclick="this.closest('dialog').remove(); openCounterDialog('${counter.id}')">
          <span>✏️</span>
          <div><strong>Rename</strong><small>Change the name or emoji</small></div>
        </button>

        <button class="counter-menu-item"
                onclick="toggleDaysBetweenFromMenu('${counter.id}', this.closest('dialog'))">
          <span>📅</span>
          <div>
            <strong>${counter.showDaysBetweenEntries ? "Hide Days Between Entries" : "Show Days Between Entries"}</strong>
            <small>${counter.showDaysBetweenEntries ? "Remove day-gap markers from this timeline" : "Display day-gap markers in this timeline"}</small>
          </div>
        </button>

        <button class="counter-menu-item"
                onclick="duplicateCounter('${counter.id}'); this.closest('dialog').remove()">
          <span>📄</span>
          <div><strong>Duplicate</strong><small>Create a copy without entries</small></div>
        </button>

        <button class="counter-menu-item delete-menu"
                onclick="deleteCounter('${counter.id}'); this.closest('dialog').remove()">
          <span>🗑️</span>
          <div><strong>Delete</strong><small>Move to Recently Deleted</small></div>
        </button>
      </div>

      <button class="counter-menu-cancel" onclick="this.closest('dialog').remove()">Cancel</button>
    </div>
  `;

  document.body.appendChild(dialog);
  dialog.addEventListener("close", () => dialog.remove());
  dialog.showModal();
}


function toggleDaysBetweenFromMenu(counterId, dialog) {
  const counter = getCounter(counterId);
  if (!counter) return;

  counter.showDaysBetweenEntries = !counter.showDaysBetweenEntries;
  saveState(state);

  if (dialog) dialog.remove();
  showToast(counter.showDaysBetweenEntries ? "Day gaps enabled" : "Day gaps disabled");

  if (selectedCounterId === counterId) {
    renderDetail(counterId);
  } else {
    render();
  }
}

function duplicateCounter(counterId) {
  const counter = getCounter(counterId);
  if (!counter) return;

  state.counters.push({
    id: uid(),
    name: `${counter.name} Copy`,
    emoji: counter.emoji || "📌",
    color: counter.color || "#d7b56d",
    archived: false,
    showDaysBetweenEntries: !!counter.showDaysBetweenEntries,
    createdAt: new Date().toISOString(),
    entries: []
  });

  saveState(state);
  showToast("Counter duplicated");
  render();
}

function archiveCounter(counterId) {
  const counter = getCounter(counterId);
  if (!confirm(`Archive "${counter.name}"?`)) return;
  counter.archived = true;
  selectedCounterId = null;
  saveState(state);
  render();
}

function restoreCounter(counterId) {
  const counter = getCounter(counterId);
  counter.archived = false;
  selectedCounterId = null;
  saveState(state);
  render();
}

function deleteCounter(counterId) { const c=getCounter(counterId); if(c&&confirm(`Move "${c.name}" to Recently Deleted?`)) moveCounterToRecentlyDeleted(counterId); }

function deleteEntry(counterId, entryId) {
  const counter = getCounter(counterId);
  if (!confirm("Delete this entry?")) return;
  counter.entries = counter.entries.filter(e => e.id !== entryId);
  saveState(state);
  render();
}

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => navigator.serviceWorker.register("service-worker.js").catch(() => {}));
}

render();

  </script>
</body>
</html>
